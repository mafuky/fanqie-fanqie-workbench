<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄写作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #111113;
      --bg-tertiary: #18181b;
      --bg-elevated: #1e1e22;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --accent-subtle: rgba(249, 115, 22, 0.1);
      --green: #22c55e;
      --green-subtle: rgba(34, 197, 94, 0.1);
      --red: #ef4444;
      --red-subtle: rgba(239, 68, 68, 0.1);
      --blue: #3b82f6;
      --purple: #a855f7;
      --radius: 8px;
      --radius-lg: 12px;
    }
    html { font-size: 15px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent); color: #000; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
    @keyframes ui-spin { to { transform: rotate(360deg); } }
    @keyframes ui-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes ui-toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes ui-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ui-scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Sidebar nav hover */
    .nav-item { transition: background 0.12s ease, color 0.12s ease; }
    .nav-item:hover { background: var(--bg-tertiary); }
    .nav-item[data-active="true"] { background: var(--accent-subtle) !important; color: var(--accent); font-weight: 600; }
    .nav-item[data-active="true"]:hover { background: var(--accent-subtle) !important; }

    /* Chapter row hover */
    .chapter-row { transition: background 0.12s ease; }
    .chapter-row:hover { background: var(--bg-tertiary); }

    /* History row hover */
    .history-row { transition: background 0.12s ease; }
    .history-row:hover { background: var(--bg-tertiary); }

    /* Page content fade-in */
    .page-content { animation: ui-fade-in 0.15s ease; }

    /* Responsive */
    @media (max-width: 768px) {
      :root {
        --sidebar-collapsed: 1;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
